<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shopify Advanced Experts | MarTech Automation</title>
  <link href="css/tailwind.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #4F46E5;
      --primary-dark: #3730A3;
      --secondary: #10B981;
      --accent: #F59E0B;
      --dark: #1F2937;
      --light: #F3F4F6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #333;
      line-height: 1.7;
      background-color: #f9fafb;
    }

    .nav-link {
      position: relative;
      transition: all 0.3s ease;
    }

    .nav-link:after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    .nav-link:hover:after {
      width: 100%;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      display: inline-block;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .btn-secondary {
      background-color: var(--secondary);
      color: white;
    }

    .btn-secondary:hover {
      background-color: #0ea271;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .section-title {
      position: relative;
      margin-bottom: 3rem;
      font-weight: 700;
    }

    .section-title:after {
      content: '';
      position: absolute;
      width: 100px;
      height: 3px;
      background-color: var(--primary);
      bottom: -15px;
      left: 0;
    }

    .section-title.centered:after {
      left: 50%;
      transform: translateX(-50%);
    }

    .card {
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      overflow: hidden;
      background-color: white;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .feature-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .gradient-bg {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    }

    .text-gradient {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .timeline {
      position: relative;
    }

    .timeline:before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: #e5e7eb;
      transform: translateX(-50%);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 40px;
    }

    .timeline-content {
      position: relative;
      width: calc(50% - 30px);
      padding: 20px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .timeline-item:nth-child(odd) .timeline-content {
      margin-left: auto;
    }

    .timeline-content:before {
      content: '';
      position: absolute;
      top: 20px;
      width: 30px;
      height: 2px;
      background-color: #e5e7eb;
    }

    .timeline-item:nth-child(odd) .timeline-content:before {
      left: -30px;
    }

    .timeline-item:nth-child(even) .timeline-content:before {
      right: -30px;
    }

    .timeline-date {
      position: absolute;
      top: 0;
      width: 120px;
      padding: 5px 10px;
      background-color: var(--primary);
      color: white;
      border-radius: 5px;
      text-align: center;
      font-size: 0.9rem;
    }

    .timeline-item:nth-child(odd) .timeline-date {
      left: -150px;
    }

    .timeline-item:nth-child(even) .timeline-date {
      right: -150px;
    }

    .fade-in {
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .timeline:before {
        left: 20px;
      }

      .timeline-content {
        width: calc(100% - 60px);
        margin-left: 60px !important;
      }

      .timeline-item:nth-child(odd) .timeline-content:before,
      .timeline-item:nth-child(even) .timeline-content:before {
        left: -30px;
        right: auto;
      }

      .timeline-item:nth-child(odd) .timeline-date,
      .timeline-item:nth-child(even) .timeline-date {
        left: 20px;
        right: auto;
        top: -30px;
        width: auto;
      }
    }
  </style>
</head>

<body class="bg-gray-50">
  <nav class="bg-white shadow-md fixed w-full z-10">
    <div class="container mx-auto px-6 py-3 flex justify-between items-center">
      <div class="flex items-center">
        <span class="text-xl font-bold text-gray-800">
          <span class="text-primary">Shopify</span><span class="text-secondary">Experts</span>
        </span>
      </div>

      <div class="hidden md:flex space-x-10">
        <a href="#home" class="nav-link text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('home')">Home</a>
        <a href="#about" class="nav-link text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('about')">About</a>
        <a href="#pricing" class="nav-link text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('pricing')">Pricing</a>
        <a href="#founders" class="nav-link text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('founders')">Founders</a>
        <a href="#features" class="nav-link text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('features')">Features</a>
      </div>

      <div class="md:hidden flex items-center">
        <button id="mobile-menu-button" class="outline-none">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white py-3 px-6 shadow-inner">
      <a href="#home" class="block py-2 text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('home')">Home</a>
      <a href="#about" class="block py-2 text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('about')">About</a>
      <a href="#pricing" class="block py-2 text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('pricing')">Pricing</a>
      <a href="#founders" class="block py-2 text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('founders')">Founders</a>
      <a href="#features" class="block py-2 text-gray-700 hover:text-primary font-medium navBtn" onclick="showPage('features')">Features</a>
    </div>
  </nav>

  <main id="content" class="pt-24 container mx-auto px-6"></main>

  <script>
    document.getElementById('mobile-menu-button').addEventListener('click', function () {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    async function showPage(pageId) {
      try {
        const response = await fetch(`${pageId}.html`);
        if (!response.ok) throw new Error('Page not found');
        const html = await response.text();
        const content = document.getElementById('content');
        content.innerHTML = html;

        document.querySelectorAll('.navBtn').forEach(btn => {
          btn.classList.remove('text-primary');
          if (btn.getAttribute('onclick').includes(pageId)) {
            btn.classList.add('text-primary');
          }
        });

        document.getElementById('mobile-menu').classList.add('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        animateOnScroll();
      } catch (error) {
        console.error(error);
        document.getElementById('content').innerHTML = '<p class="text-center text-red-500 mt-20">Page could not be loaded.</p>';
      }
    }

    function animateOnScroll() {
      const elements = document.querySelectorAll('.card, .feature-icon, .section-title, .timeline-item');
      elements.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top <= window.innerHeight * 0.8) {
          el.classList.add('fade-in');
        }
      });
    }

    window.addEventListener('load', () => showPage('home'));
    window.addEventListener('scroll', animateOnScroll);
  </script>
</body>

</html>
